name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate debug keystore for signing
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA \
            -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Release APK
        run: ./gradlew assembleDevRelease --no-daemon
        env:
          SENTRY_DSN: 'https://public_key@example.com/project_id'
          SENTRY_AUTH_TOKEN: ''
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Sign APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            $(find . -name "*.apk" | head -1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FocusLauncher-Release
          path: app-release-signed.apk
          retention-days: 30