name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate debug keystore for signing
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA \
            -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # AGGRESSIVE CLEAN: Remove all build directories and Gradle cache
      - name: Aggressive clean
        run: |
          rm -rf app/build
          rm -rf .gradle
          rm -rf ~/.gradle/caches/build-cache-1
          rm -rf ~/.gradle/caches  # ADDED: Full cache clean

      # WORKAROUND: Create a script to delete KSP generated files before they conflict
      - name: Create KSP cleanup script
        run: |
          mkdir -p .github/scripts
          cat > .github/scripts/ksp-clean.sh << 'EOF'
          #!/bin/bash
          # Delete KSP generated files to prevent FileAlreadyExistsException
          find . -path "*/build/generated/ksp/*/java/byRounds/*" -name "*.java" -delete 2>/dev/null || true
          find . -path "*/build/generated/ksp/*" -name "LauncherActivity_GeneratedInjector.java" -delete 2>/dev/null || true
          EOF
          chmod +x .github/scripts/ksp-clean.sh

      - name: Build Release APK
        run: |
          # Run clean first
          ./gradlew clean --no-daemon
          # Run build with KSP file deletion workaround
          while ! ./gradlew assembleDevRelease --no-daemon --no-build-cache 2>&1; do
            echo "Build failed, cleaning KSP files and retrying..."
            .github/scripts/ksp-clean.sh
            # Check if it's the FileAlreadyExistsException error
            if grep -q "FileAlreadyExistsException" /tmp/build.log 2>/dev/null; then
              continue
            else
              exit 1
            fi
          done
        env:
          SENTRY_DSN: 'https://public_key@example.com/project_id'
          SENTRY_AUTH_TOKEN: ''
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dksp.incremental=false"

      - name: Sign APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            $(find . -name "*.apk" | head -1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FocusLauncher-Release
          path: app-release-signed.apk
          retention-days: 30
